{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg text-center p-4" style="border-radius: 20px;">
                <div class="card-body">
                    <i class="fa-solid fa-triangle-exclamation text-danger display-3 mb-4"></i>
                    <h2 class="fw-bold text-dark">¿Estás seguro?</h2>
                    <p class="text-muted mb-4">
                        Vas a eliminar el registro de producción del especialista 
                        <strong>{{ object.medico.nombre }}</strong> del día <strong>{{ object.fecha_labor|date:"d/m/Y" }}</strong>.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold">
                                <i class="fa-solid fa-trash me-2"></i> Eliminar Definitivamente
                            </button>
                            <a href="{% url 'produccion-list' %}" class="btn btn-light btn-lg rounded-pill text-muted">
                                Cancelar y Volver
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
