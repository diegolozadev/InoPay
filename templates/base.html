{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InoPay{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">

</head>
<body>

    <div id="wrapper">
    <div id="sidebar-wrapper">
        <div class="sidebar-heading border-bottom">
            <img src="{% static 'images/logotipo_ino.png' %}" alt="InoPay Logo" class="logo ms-3">
        </div>
        <div class="list-group list-group-flush">
            <a href="{% url 'medico-list' %}" 
            class="list-group-item list-group-item-action {% if '/medicos/' in request.path %}active{% endif %}">
                <i class="fas fa-user-md nav-icon"></i>
                <span class="menu-text">Médicos</span>
            </a>

            <a href="{% url 'tarifas' %}" 
            class="list-group-item list-group-item-action {% if '/tarifas/' in request.path %}active{% endif %}">
                <i class="fas fa-file-invoice-dollar nav-icon"></i>
                <span class="menu-text">Tarifas</span>
            </a>

            <a href="#" 
            class="list-group-item list-group-item-action {% if '/citas/' in request.path %}active{% endif %}">
                <i class="fas fa-calendar-check nav-icon"></i>
                <span class="menu-text">Citas</span>
            </a>
        </div>
    </div>

        <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-white mb-4 border-bottom shadow-sm">
            <div class="container-fluid">
                <div class="d-flex align-items-center">
                    <button class="btn btn-primary" id="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    
                    <h4 class="mb-0 ms-3 fw-bold" style="letter-spacing: -1px;">INOPay</h4>    
                    <i class="fa-solid fa-file-invoice-dollar" style="margin-left: 5px; color: #1d4e99;"></i>
                    
                    <div class="vr mx-3 text-muted opacity-25" style="height: 20px;"></div>

                    <span class="navbar-text text-uppercase fw-bold text-muted small">
                        {% block section_title %}
                            Dashboard
                        {% endblock %}
                    </span>
                </div>
                
                <div class="ms-auto">
                    <small class="text-muted"><i class="fas fa-calendar-alt"></i> 2026</small>
                </div>
            </div>
        </nav>

            <div class="container-fluid">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.getElementById("menu-toggle").addEventListener("click", function(e) {
        e.preventDefault();
        document.getElementById("wrapper").classList.toggle("toggled");
    });
    </script>
</body>
</html>
