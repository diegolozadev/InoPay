<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | INOPay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #004481;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #002d56;
            transform: translateY(-2px);
        }
        .input-group-text {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="card login-card p-4">
                <div class="card-body text-center">
                    <img src="{% static 'images/logotipo_ino.png' %}" alt="Logo INO" class="mb-4" style="max-height: 70px;">
                    
                    <h3 class="fw-bold text-dark mb-1">INOPay</h3>

                    <p class="text-muted small mb-4">Gestión de Producción Médica</p>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-secondary">USUARIO</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Ingresa tu usuario" required>
                            </div>
                        </div>

                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold text-secondary">CONTRASEÑA</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        {% if form.errors %}
                        <div class="alert alert-danger py-2 small mb-3">
                            <i class="fa-solid fa-circle-exclamation me-2"></i> Datos incorrectos
                        </div>
                        {% endif %}

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow">
                            ACCEDER <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4 text-muted">
                <small>&copy; 2026 hecho con <i class="fas fa-heart text-danger animate-pulse"></i> por el equipo DataINO</small> 
            </div>

        </div>
    </div>
</div>

<style>
    /* Un pequeño detalle para que el corazón tenga vida */
    .animate-pulse {
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>

</body>
</html>
